name: group_verify_email_auto
display_name: QQ群邮箱验证码插件
author: 感情
version: "1.8.2"
short_desc: 基于邮箱验证码的入群验证插件，支持数学题验证
description: >
  基于邮箱验证码 + 数学题双模式入群验证插件。
  自动使用QQ号构造邮箱，支持回归用户检测、自定义模板、数据库记录等多种功能。
  修复了配置读取失败导致消息为空的问题，增加了更健壮的错误处理和调试日志。
  新增：配置自动保存到SQLite数据库，配置丢失也可以从数据库恢复！
repo_url: https://github.com/YOYOFeelings/group_verify_email_auto
support_platforms:
 - aiocqhttp
 - qq_official
astrbot_version: ">=4.0"
