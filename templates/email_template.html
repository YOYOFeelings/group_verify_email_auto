<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>入群验证邮件</title>
    <meta name="format-detection" content="telephone=no, date=no, address=no, email=no">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
</head>
<body style="margin:0; padding:0; width:100%; min-height:100vh; background-color:#f7f8fa; font-family:'helvetica neue',PingFangSC-Light,arial,'hiragino sans gb','microsoft yahei ui','microsoft yahei',simsun,sans-serif;">
    <table width="100%" height="100%" border="0" cellpadding="0" cellspacing="0" background="{bg_url}" style="background-color:#f7f8fa; background-image:url('{bg_url}'); background-size:cover; background-position:center center; background-repeat:no-repeat;">
        <tr>
            <td align="center" valign="top" style="padding:20px 0;">
                <div align="center">
                    <div style="margin:8px;">
                        <div style="word-break:break-all;box-sizing:border-box;text-align:center;min-width:320px;max-width:660px;margin:auto;padding:20px 0 30px;">
                            <table style="width:100%;font-weight:300;margin-bottom:10px;border-collapse:collapse">
                                <tbody>
                                    <tr>
                                        <td style="width:3%;max-width:30px;"></td>
                                        <td style="max-width:600px;">
                                            <div style="font-size:20px;font-weight:700;color:#00a4ff;line-height:36px;text-shadow:0 1px 2px rgba(255,255,255,0.8);">感情</div>
                                            <p style="height:2px;background:#00a4ff;border:0;font-size:0;padding:0;width:100%;margin-top:14px;box-shadow:0 1px 2px rgba(255,255,255,0.5);"></p>
                                            <div style="{card_style} padding:23px 0 20px;box-shadow:0 2px 8px 0 rgba(122,55,55,0.15);text-align:left;border-radius:12px;">
                                                <table style="width:100%;font-weight:300;margin-bottom:10px;border-collapse:collapse;text-align:left;">
                                                    <tbody>
                                                        <tr>
                                                            <td style="width:3.2%;max-width:30px;"></td>
                                                            <td style="max-width:480px;text-align:left;">
                                                                <h1 style="font-size:20px;line-height:36px;margin:0 0 22px;color:#2c3e50;">欢迎加入 {group_name}</h1>
                                                                <p style="font-size:14px;color:#333;line-height:24px;margin:0;">亲爱的 <strong>{member_name}</strong>，你好呀 👋</p>
                                                                <p style="font-size:14px;color:#333;line-height:24px;margin:6px 0 0;">感谢你的到来，让这里更加温暖。下面是你的专属验证码：</p>
                                                                <div style="background:rgba(0,164,255,0.1);border:1px solid #00a4ff;border-radius:8px;padding:18px 16px;text-align:center;margin-top:20px;">
                                                                    <span style="font-size:30px;font-weight:700;letter-spacing:6px;color:#0078d4;font-family:'SF Mono','Consolas','Menlo',monospace;line-height:1.3;">{code}</span>
                                                                </div>
                                                                <p style="font-size:14px;color:#333;line-height:24px;margin:16px 0 0;">请在 <strong>{timeout} 分钟</strong> 内在群内 @我 并回复此验证码，过期需要重新获取哦。</p>
                                                                <p style="font-size:14px;line-height:26px;margin-top:28px;">期待与你相遇<br><strong>机器人验证</strong></p>
                                                            </td>
                                                            <td style="width:3.2%;max-width:30px;"></td>
                                                        </tr>
                                                    </tbody>
                                                </table>
                                            </div>
                                            <div style="text-align:center;font-size:12px;line-height:18px;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,0.5);margin-top:20px;">
                                                <p style="margin:0 auto 6px;">此邮件由机器人自动发送，请勿回复。</p>
                                                <p style="margin:0 auto;">如非本人操作，请忽略本邮件。</p>
                                            </div>
                                        </td>
                                        <td style="width:3%;max-width:30px;"></td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </td>
        </tr>
    </table>
</body>
</html>
