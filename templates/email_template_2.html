<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>入群验证邮件</title>
    <meta name="format-detection" content="telephone=no, date=no, address=no, email=no">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
</head>
<body style="margin:0; padding:0; width:100%; min-height:100vh; background-color:#ffffff; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;">
    <table width="100%" height="100%" border="0" cellpadding="0" cellspacing="0" style="background-color:#ffffff;">
        <tr>
            <td align="center" valign="top" style="padding:40px 0;">
                <div align="center">
                    <div style="word-break:break-all;box-sizing:border-box;text-align:center;min-width:320px;max-width:600px;margin:auto;">
                        <table style="width:100%;border-collapse:collapse">
                            <tbody>
                                <tr>
                                    <td style="text-align:center;">
                                        <div style="border:1px solid #e5e7eb;border-radius:12px;padding:40px 32px;text-align:left;">
                                            <h1 style="font-size:24px;line-height:32px;margin:0 0 16px;color:#111827;font-weight:600;">欢迎加入 {group_name}</h1>
                                            <p style="font-size:16px;color:#4b5563;line-height:24px;margin:0 0 24px;">亲爱的 <strong>{member_name}</strong>，你好！</p>
                                            <p style="font-size:16px;color:#4b5563;line-height:24px;margin:0 0 24px;">感谢你的加入，以下是你的验证码：</p>
                                            
                                            <div style="background:#f9fafb;border:1px solid #e5e7eb;border-radius:8px;padding:24px;text-align:center;margin-bottom:24px;">
                                                <div style="font-size:36px;font-weight:700;letter-spacing:8px;color:#111827;font-family:monospace;line-height:1.2;">{code}</div>
                                            </div>
                                            
                                            <p style="font-size:16px;color:#4b5563;line-height:24px;margin:0 0 32px;">请在 <strong>{timeout} 分钟</strong> 内在群内 @我 并回复此验证码。</p>
                                            
                                            <div style="border-top:1px solid #e5e7eb;padding-top:24px;">
                                                <p style="font-size:14px;color:#9ca3af;line-height:20px;margin:0;">此邮件由系统自动发送，请勿回复。</p>
                                            </div>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </td>
        </tr>
    </table>
</body>
</html>
