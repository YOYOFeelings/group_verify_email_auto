<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>入群验证邮件</title>
    <meta name="format-detection" content="telephone=no, date=no, address=no, email=no">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
</head>
<body style="margin:0; padding:0; width:100%; min-height:100vh; background:linear-gradient(135deg, #667eea 0%, #764ba2 100%); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
    <table width="100%" height="100%" border="0" cellpadding="0" cellspacing="0" style="background:linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
        <tr>
            <td align="center" valign="top" style="padding:40px 0;">
                <div align="center">
                    <div style="word-break:break-all;box-sizing:border-box;text-align:center;min-width:320px;max-width:600px;margin:auto;">
                        <table style="width:100%;border-collapse:collapse">
                            <tbody>
                                <tr>
                                    <td style="text-align:center;">
                                        <div style="background:#fff;border-radius:20px;padding:48px 40px;box-shadow:0 20px 60px rgba(0,0,0,0.3);text-align:left;">
                                            <div style="text-align:center;margin-bottom:32px;">
                                                <div style="width:64px;height:64px;background:linear-gradient(135deg, #667eea 0%, #764ba2 100%);border-radius:16px;display:inline-flex;align-items:center;justify-content:center;">
                                                    <span style="font-size:32px;">✉️</span>
                                                </div>
                                            </div>
                                            
                                            <h1 style="font-size:28px;line-height:36px;margin:0 0 16px;color:#1a202c;font-weight:700;text-align:center;">欢迎加入 {group_name}</h1>
                                            
                                            <p style="font-size:16px;color:#4a5568;line-height:26px;margin:0 0 24px;text-align:center;">亲爱的 <strong>{member_name}</strong>，很高兴见到你！</p>
                                            
                                            <p style="font-size:16px;color:#4a5568;line-height:26px;margin:0 0 28px;text-align:center;">以下是你的专属验证码，请查收：</p>
                                            
                                            <div style="background:linear-gradient(135deg, #667eea 0%, #764ba2 100%);border-radius:12px;padding:28px 24px;text-align:center;margin-bottom:28px;box-shadow:0 4px 15px rgba(102,126,234,0.4);">
                                                <div style="font-size:42px;font-weight:800;letter-spacing:10px;color:#fff;font-family:'SF Mono','Consolas',monospace;line-height:1.2;text-shadow:0 2px 8px rgba(0,0,0,0.2);">{code}</div>
                                            </div>
                                            
                                            <p style="font-size:15px;color:#718096;line-height:24px;margin:0 0 8px;text-align:center;">请在 <strong style="color:#667eea;">{timeout} 分钟</strong> 内完成验证</p>
                                            <p style="font-size:15px;color:#718096;line-height:24px;margin:0 0 32px;text-align:center;">在群内 @我 并回复此验证码即可</p>
                                            
                                            <div style="border-top:1px solid #e2e8f0;padding-top:24px;text-align:center;">
                                                <p style="font-size:13px;color:#a0aec0;line-height:20px;margin:0;">此邮件由系统自动发送，请勿回复</p>
                                            </div>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </td>
        </tr>
    </table>
</body>
</html>
