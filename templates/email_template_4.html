<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>入群验证邮件</title>
    <meta name="format-detection" content="telephone=no, date=no, address=no, email=no">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
</head>
<body style="margin:0; padding:0; width:100%; min-height:100vh; background-color:#f0f4f8; font-family:'Georgia','Times New Roman',serif;">
    <table width="100%" height="100%" border="0" cellpadding="0" cellspacing="0" style="background-color:#f0f4f8;">
        <tr>
            <td align="center" valign="top" style="padding:50px 0;">
                <div align="center">
                    <div style="word-break:break-all;box-sizing:border-box;text-align:center;min-width:320px;max-width:600px;margin:auto;">
                        <table style="width:100%;border-collapse:collapse">
                            <tbody>
                                <tr>
                                    <td style="text-align:center;">
                                        <div style="background:#fff;border-radius:8px;padding:50px 40px;box-shadow:0 2px 20px rgba(0,0,0,0.08);text-align:left;">
                                            
                                            <div style="border-bottom:2px solid #e2e8f0;padding-bottom:24px;margin-bottom:32px;">
                                                <div style="text-align:center;">
                                                    <span style="font-size:48px;">🌟</span>
                                                </div>
                                            </div>
                                            
                                            <h1 style="font-size:26px;line-height:34px;margin:0 0 20px;color:#2d3748;font-weight:600;text-align:center;letter-spacing:1px;">欢迎加入 {group_name}</h1>
                                            
                                            <p style="font-size:17px;color:#4a5568;line-height:28px;margin:0 0 24px;text-align:center;">亲爱的 <strong>{member_name}</strong>，你好！</p>
                                            
                                            <p style="font-size:17px;color:#4a5568;line-height:28px;margin:0 0 32px;text-align:center;">感谢你选择加入我们，以下是验证信息：</p>
                                            
                                            <div style="background:#f7fafc;border:2px dashed #cbd5e0;border-radius:6px;padding:32px 24px;text-align:center;margin-bottom:32px;">
                                                <p style="font-size:14px;color:#718096;line-height:20px;margin:0 0 16px;text-transform:uppercase;letter-spacing:1px;font-weight:600;">你的验证码</p>
                                                <div style="font-size:40px;font-weight:700;letter-spacing:12px;color:#2d3748;font-family:'Courier New',monospace;line-height:1.2;">{code}</div>
                                            </div>
                                            
                                            <p style="font-size:16px;color:#4a5568;line-height:26px;margin:0 0 12px;text-align:center;">请在 <strong style="color:#2b6cb0;">{timeout} 分钟</strong> 内完成验证</p>
                                            <p style="font-size:16px;color:#718096;line-height:26px;margin:0 0 36px;text-align:center;">在群内 @我 并回复验证码即可通过</p>
                                            
                                            <div style="border-top:2px solid #e2e8f0;padding-top:28px;text-align:center;">
                                                <p style="font-size:14px;color:#a0aec0;line-height:22px;margin:0;">此邮件由系统自动发送 · 请勿回复</p>
                                            </div>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </td>
        </tr>
    </table>
</body>
</html>
