<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>插件运行日志</title>
    <meta name="format-detection" content="telephone=no, date=no, address=no, email=no">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
</head>
<body style="margin:0; padding:0; width:100%; min-height:100vh; background-color:#f4f7fc; font-family:'Microsoft YaHei',sans-serif;">
    <table width="100%" height="100%" border="0" cellpadding="0" cellspacing="0" background="{bg_url}" style="background-color:#f4f7fc; background-image:url('{bg_url}'); background-size:cover; background-position:center center; background-repeat:no-repeat;">
        <tr>
            <td align="center" valign="top" style="padding:20px 0;">
                <div align="center">
                    <div style="margin:8px;">
                        <div style="word-break:break-all;box-sizing:border-box;text-align:center;min-width:320px;max-width:600px;margin:auto;padding:20px 0 30px;">
                            <div style="margin-bottom:20px;">
                                <div style="font-size:20px;font-weight:700;color:#ffffff;text-shadow:0 1px 3px rgba(0,0,0,0.5);">📋 插件运行日志</div>
                            </div>
                            <div style="{card_style} padding:23px 0 20px;box-shadow:0 2px 8px 0 rgba(122,55,55,0.15);text-align:left;border-radius:12px;">
                                <table style="width:100%;font-weight:300;margin-bottom:10px;border-collapse:collapse;text-align:left;">
                                    <tbody>
                                        <tr>
                                            <td style="width:3.2%;max-width:30px;"></td>
                                            <td style="max-width:480px;text-align:left;">
                                                <p style="font-size:15px;color:#333;line-height:28px;margin:0;">
                                                    管理员：<strong>{member_name}</strong><br>
                                                    日志时间：{log_time}<br>
                                                    日志文件：<code>{log_filename}</code>
                                                </p>
                                                <p style="font-size:14px;color:#666;line-height:24px;margin-top:20px;">附件为插件完整运行日志，可用于排查问题。</p>
                                                <div style="margin-top:24px; padding:12px; background:rgba(255,248,225,0.8); border-left:4px solid #f0ad4e; border-radius:4px;">
                                                    <p style="margin:0; font-size:13px; color:#8a6d3b;">⚠️ 此邮件自动生成，请勿回复。</p>
                                                </div>
                                            </td>
                                            <td style="width:3.2%;max-width:30px;"></td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                            <div style="text-align:center;font-size:12px;line-height:18px;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,0.5);margin-top:20px;">
                                QQ群邮箱验证插件 · 日志系统
                            </div>
                        </div>
                    </div>
                </div>
            </td>
        </tr>
    </table>
</body>
</html>
